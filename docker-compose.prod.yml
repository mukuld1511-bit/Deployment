# Production Docker Compose - Used on AWS EC2 / Cloud VM
# Runs all 3 containers with restart policies and environment variables

services:
  gui:
    build:
      context: ./gui
      dockerfile: Dockerfile
    container_name: payment-gui-prod
    ports:
      - "8501:8501"
    environment:
      - PAYMENT_API_URL=http://app:8080
    depends_on:
      - app
    networks:
      - payment-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: payment-backend-prod
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/deploymentdb
    networks:
      - payment-network
    restart: always

  mongo:
    image: mongo:7
    container_name: payment-mongo-prod
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - payment-network
    restart: always

networks:
  payment-network:
    driver: bridge

volumes:
  mongo-data:
