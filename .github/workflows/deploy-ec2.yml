name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          set -e

          DEPLOY_DIR="$HOME/Deployment"

          echo "=== Step 1: Setup Deployment Directory ==="
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "Cloning repository for first time..."
            git clone https://github.com/mukuld1511-bit/Deployment.git "$DEPLOY_DIR"
          fi

          cd "$DEPLOY_DIR"
          echo "Working directory: $(pwd)"

          echo "=== Step 2: Pull Latest Code ==="
          git fetch --all
          git reset --hard origin/main
          echo "Latest commit: $(git log --oneline -1)"

          echo "=== Step 3: Stop Old Containers ==="
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

          echo "=== Step 4: Clean Docker Cache ==="
          docker builder prune -af || true
          docker image prune -af || true

          echo "=== Step 5: Build Fresh (No Cache) ==="
          docker compose -f docker-compose.prod.yml build --no-cache

          echo "=== Step 6: Start Containers ==="
          docker compose -f docker-compose.prod.yml up -d

          echo "=== Step 7: Wait for Startup ==="
          sleep 10

          echo "=== Step 8: Container Status ==="
          docker compose -f docker-compose.prod.yml ps

          echo "=== Step 9: Container Logs (last 20 lines each) ==="
          docker compose -f docker-compose.prod.yml logs --tail=20

          echo "=== Deployment Complete ==="
