name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    name: Deploy 3-Container Stack to AWS EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          echo "🚀 Pulling latest code and building 3-container stack on AWS EC2..."
          cd ~/Deployment || cd /home/ubuntu/Deployment || cd /var/www/Deployment || exit 1
          git pull origin main
          docker compose -f docker-compose.prod.yml up --build -d
          echo "✅ EC2 Deployment successful! Container status:"
          docker compose -f docker-compose.prod.yml ps
