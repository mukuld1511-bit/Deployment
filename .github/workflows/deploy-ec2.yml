name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          echo "Checking deployment directory on EC2..."
          if [ -d "$HOME/Deployment" ]; then
            cd "$HOME/Deployment"
          elif [ -d "/home/ubuntu/Deployment" ]; then
            cd "/home/ubuntu/Deployment"
          else
            echo "Cloning repository..."
            git clone https://github.com/mukuld1511-bit/Deployment.git ~/Deployment
            cd ~/Deployment
          fi
          echo "Pulling latest changes and launching 3-container stack..."
          git pull origin main
          docker compose -f docker-compose.prod.yml up --build -d
          docker compose -f docker-compose.prod.yml ps
