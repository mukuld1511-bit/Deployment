name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          echo "=== Checking deployment directory on EC2 ==="
          if [ -d "$HOME/Deployment" ]; then
            cd "$HOME/Deployment"
          elif [ -d "/home/ubuntu/Deployment" ]; then
            cd "/home/ubuntu/Deployment"
          else
            echo "Cloning repository..."
            git clone https://github.com/mukuld1511-bit/Deployment.git ~/Deployment
            cd ~/Deployment
          fi

          echo "=== Pulling latest code from GitHub ==="
          git fetch --all
          git reset --hard origin/main

          echo "=== Stopping existing containers ==="
          docker compose -f docker-compose.prod.yml down --remove-orphans

          echo "=== Pruning old Docker image cache ==="
          docker builder prune -f
          docker image prune -f

          echo "=== Rebuilding containers fresh (no cache) ==="
          docker compose -f docker-compose.prod.yml build --no-cache

          echo "=== Starting updated containers ==="
          docker compose -f docker-compose.prod.yml up -d

          echo "=== Container Status ==="
          docker compose -f docker-compose.prod.yml ps
