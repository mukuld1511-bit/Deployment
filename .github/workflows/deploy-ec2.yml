name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Copy files to EC2 via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: ".,!node_modules"
        target: "/home/${{ secrets.EC2_USERNAME }}/Deployment"
        rm: true

    - name: Deploy to AWS EC2 Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        command_timeout: 15m
        script: |
          set -e
          cd "$HOME/Deployment"
          echo "Working directory: $(pwd)"
          echo "Files in Deployment:"
          ls -la

          echo "=== Step 1: Stop Old Containers ==="
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

          echo "=== Step 2: Clean Docker Cache ==="
          docker builder prune -af || true
          docker image prune -af || true

          echo "=== Step 3: Build & Start Containers (Fast) ==="
          docker compose -f docker-compose.prod.yml up --build -d

          echo "=== Step 4: Wait for Startup ==="
          sleep 10

          echo "=== Step 5: Container Status ==="
          docker compose -f docker-compose.prod.yml ps

          echo "=== Step 6: Container Logs ==="
          docker compose -f docker-compose.prod.yml logs --tail=20

          echo "=== Deployment Complete ==="
